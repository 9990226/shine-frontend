# 2c-ai.com — HTTP redirect + HTTPS (SHINE /shine-api proxy)
server {
    listen 80;
    server_name 2c-ai.com www.2c-ai.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 2c-ai.com www.2c-ai.com;

    ssl_certificate /etc/letsencrypt/live/2c-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/2c-ai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/2c-ai;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /shine-api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /shine {
        return 301 /shine/;
    }

    location /shine/ {
        alias /var/www/2c-ai/shine/;
        index index.html;
        try_files $uri $uri/ /shine/index.html;
    }

    location /interview-api/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /interview/app/ {
        alias /var/www/2c-ai/interview/app/;
        try_files $uri $uri/ /interview/app/index.html;
    }

    location = /interview {
        return 301 /interview/;
    }

    location /interview/ {
        alias /var/www/2c-ai/interview/;
        try_files $uri $uri/ /interview/index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}